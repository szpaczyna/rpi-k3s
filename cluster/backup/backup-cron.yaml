---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: backup
  namespace: kube-system
spec:
  schedule: "0 4 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 2
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          dnsPolicy: ClusterFirstWithHostNet
          containers:
            - name: backup
              image: alpine:3.24.1
              command: ["/bin/sh", "-c"]
              args:
                - apk add --no-cache rsync && cd /data && rsync -Paz /data/[ma]* /data/backup
              volumeMounts:
                - name: data
                  mountPath: /data
          restartPolicy: OnFailure
          volumes:
            - name: data
              hostPath:
                path: /opt
                type: Directory
